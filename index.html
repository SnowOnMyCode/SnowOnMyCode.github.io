<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Memristive SNN — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="locked">
<div id="gate" class="gate">
  <div class="gate-card">
    <div class="gate-mark">SNN</div>
    <h3>Access required</h3>
    <p>Enter the access code to view this demo.</p>
    <input id="gate-input" type="password" autocomplete="off" autocapitalize="off"
           spellcheck="false" placeholder="code">
    <button id="gate-submit">Enter</button>
    <div id="gate-error" class="gate-error"></div>
  </div>
</div>

<div id="root"></div>

<!-- Sim core (plain JS) -->
<script src="snn-sim.js"></script>

<!-- Tweaks shell + helpers -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Themes (plain JS, exposes window.THEMES / getTheme) -->
<script src="themes.js"></script>

<!-- React components — load with Babel -->
<script type="text/babel" src="network-viz.jsx"></script>
<script type="text/babel" src="plots.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<!-- Passcode gate -->
<script src="gate.js"></script>
</body>
</html>
